<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;800;900&amp;display=swap');
    </style>
  </defs>
  <rect width="1200" height="630" fill="#014421"/>
  <!-- Subtle leaf pattern -->
  <pattern id="leaves" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
    <ellipse cx="20" cy="20" rx="2" ry="3" fill="rgba(208,216,195,0.06)"/>
  </pattern>
  <rect width="1200" height="630" fill="url(#leaves)"/>
  <!-- Decorative blob -->
  <ellipse cx="950" cy="150" rx="200" ry="180" fill="rgba(208,216,195,0.08)" transform="rotate(-15 950 150)"/>
  <ellipse cx="200" cy="500" rx="150" ry="130" fill="rgba(208,216,195,0.06)" transform="rotate(10 200 500)"/>
  <!-- Content -->
  <text x="80" y="200" font-family="Inter, sans-serif" font-weight="900" font-size="96" fill="#D0D8C3" letter-spacing="-3">MelonPatch</text>
  <line x1="80" y1="230" x2="500" y2="230" stroke="rgba(208,216,195,0.3)" stroke-width="1"/>
  <text x="80" y="290" font-family="Inter, sans-serif" font-weight="400" font-size="32" fill="rgba(208,216,195,0.8)">Cultivating Products for the You of Today</text>
  <text x="80" y="370" font-family="Inter, sans-serif" font-weight="400" font-size="22" fill="rgba(208,216,195,0.5)">Indie software studio building AI-powered tools</text>
  <text x="80" y="405" font-family="Inter, sans-serif" font-weight="400" font-size="22" fill="rgba(208,216,195,0.5)">and experiences for language learners.</text>
  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="rgba(0,0,0,0.2)"/>
  <text x="80" y="617" font-family="monospace" font-size="14" fill="rgba(208,216,195,0.6)">melonpatch.dev</text>
</svg>
